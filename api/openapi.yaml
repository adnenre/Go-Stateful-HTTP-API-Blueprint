openapi: 3.0.0
info:
  title: REST API Blueprint
  description: |
    A reusable, contract‑first REST API template with enterprise‑ready features.
    This specification defines the `/api/v1/health` endpoint and adds authentication,
    user profile, and admin management.
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
  - url: https://api.example.com/api/v1
    description: Production server

tags:
  - name: Health
    description: Service health and readiness checks
  - name: Auth
    description: Authentication and registration
  - name: Users
    description: User profile and preferences
  - name: Admin
    description: Administrative user management

paths:
  # ==================== HEALTH ====================
  /api/v1/health:
    get:
      summary: Health check
      description: |
        Returns the current health status of the API service, including uptime,
        version, and timestamp. Used by load balancers and orchestration tools.
      operationId: getHealth
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: success
                data:
                  status: healthy
                  timestamp: "2026-04-22T12:34:56Z"
                  uptime: "2h3m5s"
                  version: "1.0.0"
                  checks:
                    database: "ok"
        "503":
          description: Service is unhealthy (e.g., database down)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: success
                data:
                  status: unhealthy
                  timestamp: "2026-04-22T12:34:56Z"
                  uptime: "2h3m5s"
                  version: "1.0.0"
                  checks:
                    database: "failed"

  # ==================== AUTHENTICATION ====================
  /api/v1/auth/register:
    post:
      summary: Register a new user
      operationId: register
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, username]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                username:
                  type: string
                  description: Unique username
                avatar:
                  type: string
                  description: URL to profile picture (optional)
      responses:
        "201":
          description: User created successfully
        "400":
          description: Invalid input
        "409":
          description: Email or username already exists

  /api/v1/auth/login:
    post:
      summary: Login and obtain JWT
      operationId: login
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        "401":
          description: Invalid credentials

  # ==================== USERS ====================
  /api/v1/users/me:
    get:
      summary: Get current user profile
      operationId: getMe
      tags:
        - Users
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /api/v1/users/me/preferences:
    patch:
      summary: Update user preferences
      operationId: updatePreferences
      tags:
        - Users
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notifications:
                  type: boolean
                language:
                  type: string
      responses:
        "200":
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
        "401":
          description: Unauthorized

  # ==================== ADMIN ====================
  /api/v1/admin/users:
    get:
      summary: List all users (admin only)
      operationId: listUsers
      tags:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (not admin)

    post:
      summary: Create a user (admin only)
      operationId: createUser
      tags:
        - Admin
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role, username]
              properties:
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [user, admin]
                username:
                  type: string
                avatar:
                  type: string
      responses:
        "201":
          description: User created
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /api/v1/admin/users/{id}:
    get:
      summary: Get user by ID (admin only)
      operationId: getUser
      tags:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User not found

    put:
      summary: Update user (admin only)
      operationId: updateUser
      tags:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                role:
                  type: string
                  enum: [user, admin]
                password:
                  type: string
                username:
                  type: string
                avatar:
                  type: string
      responses:
        "200":
          description: User updated
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User not found

    delete:
      summary: Delete user (admin only)
      operationId: deleteUser
      tags:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: User deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User not found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - data
      properties:
        status:
          type: string
          enum: [success, error]
          description: Overall status of the API response envelope
          example: success
        data:
          type: object
          required:
            - status
            - timestamp
            - uptime
            - version
          properties:
            status:
              type: string
              enum: [healthy, unhealthy]
              description: Health state of the service
            timestamp:
              type: string
              format: date-time
              description: Current server time (ISO 8601)
            uptime:
              type: string
              description: Human‑readable service uptime (e.g., "1h2m3s")
            version:
              type: string
              description: API version (from build time)
            checks:
              type: object
              additionalProperties:
                type: string
              description: Detailed health checks for dependencies (database, cache, etc.)
              example:
                database: "ok"
                redis: "ok"

    UserProfile:
      type: object
      required:
        - id
        - username
        - email
        - role
      properties:
        id:
          type: string
        username:
          type: string
          description: Unique username
        email:
          type: string
        avatar:
          type: string
          description: URL to profile picture (optional)
        role:
          type: string
          enum: [user, admin]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserPreferences:
      type: object
      properties:
        notifications:
          type: boolean
        language:
          type: string
