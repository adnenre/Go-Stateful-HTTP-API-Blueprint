openapi: 3.0.0
info:
  title: REST API Blueprint
  description: |
    A reusable, contract‑first REST API template with enterprise‑ready features.
    This specification defines the `/health` endpoint and adds authentication,
    user profile, and admin management.
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
  - url: https://api.example.com/api/v1
    description: Production server

tags:
  - name: Health
    description: Service health and readiness checks
  - name: Auth
    description: Authentication and registration
  - name: Users
    description: User profile and preferences
  - name: Admin
    description: Administrative user management

paths:
  # ==================== HEALTH ====================
  /health:
    get:
      summary: Health check
      description: |
        Returns the current health status of the API service, including uptime,
        version, and timestamp. Used by load balancers and orchestration tools.
      operationId: getHealth
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: success
                data:
                  status: healthy
                  timestamp: "2026-04-22T12:34:56Z"
                  uptime: "2h3m5s"
                  version: "1.0.0"
                  checks:
                    database: "ok"
        "503":
          description: Service is unhealthy (e.g., database down)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: success
                data:
                  status: unhealthy
                  timestamp: "2026-04-22T12:34:56Z"
                  uptime: "2h3m5s"
                  version: "1.0.0"
                  checks:
                    database: "failed"

  # ==================== AUTHENTICATION ====================
  /auth/register:
    post:
      summary: Register a new user (pending, OTP sent via email)
      operationId: register
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, username]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                username:
                  type: string
                  description: Unique username
                avatar:
                  type: string
                  description: URL to profile picture (optional)
      responses:
        "202":
          description: Registration accepted, OTP sent to email
        "400":
          description: Invalid input
        "409":
          description: Email or username already exists

  /auth/login:
    post:
      summary: Login and obtain JWT
      description: |
        For web browsers, tokens are set as httpOnly cookies. For mobile apps, tokens are also returned in the JSON response body.
      operationId: login
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful – access_token and refresh_token returned in JSON (for mobile) and also set as httpOnly cookies (for web).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials or account not activated

  /auth/verify-otp:
    post:
      summary: Verify OTP and activate account
      description: |
        For web browsers, tokens are set as httpOnly cookies. For mobile apps, tokens are also returned in the JSON response body.
      operationId: verifyOtp
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        "200":
          description: Account activated – access_token and refresh_token returned in JSON and also set as httpOnly cookies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid or expired OTP

  /auth/refresh:
    post:
      summary: Refresh access token
      description: |
        For web browsers, uses the httpOnly refresh token cookie. For mobile apps, expects refresh_token in the request body (JSON).
        Returns new tokens in JSON body and also sets new httpOnly cookies (for web).
      operationId: refreshToken
      tags:
        - Auth
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: Required for mobile apps; for web, the cookie is used.
      responses:
        "200":
          description: New access token and refresh token issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Missing or invalid refresh token

  /auth/logout:
    post:
      summary: Logout – clear access and refresh token cookies (or revoke tokens)
      operationId: logout
      tags:
        - Auth
      responses:
        "204":
          description: Successfully logged out (cookies cleared)
        "401":
          description: Unauthorized

  /auth/session:
    get:
      summary: Get current session user
      operationId: getSession
      tags:
        - Auth
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Current user session
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized (missing or invalid token)

  /auth/password-reset/request:
    post:
      summary: Request password reset email
      operationId: requestPasswordReset
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        "202":
          description: Reset email sent (if account exists)
        "400":
          description: Invalid email

  /auth/password-reset/confirm:
    post:
      summary: Confirm password reset with token
      operationId: confirmPasswordReset
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password updated
        "401":
          description: Invalid or expired token

  # ==================== USERS ====================
  /users/me:
    get:
      summary: Get current user profile
      operationId: getMe
      tags:
        - Users
      security:
        - CookieAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /users/me/preferences:
    patch:
      summary: Update user preferences
      operationId: updatePreferences
      tags:
        - Users
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notifications:
                  type: boolean
                language:
                  type: string
      responses:
        "200":
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
        "401":
          description: Unauthorized

  # ==================== ADMIN ====================
  /admin/users:
    get:
      summary: List all users (admin only)
      operationId: listUsers
      tags:
        - Admin
      security:
        - CookieAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (not admin)

    post:
      summary: Create a user (admin only)
      operationId: createUser
      tags:
        - Admin
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role, username]
              properties:
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [user, admin]
                username:
                  type: string
                avatar:
                  type: string
      responses:
        "201":
          description: User created
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/users/{id}:
    get:
      summary: Get user by ID (admin only)
      operationId: getUser
      tags:
        - Admin
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User not found

    put:
      summary: Update user (admin only)
      operationId: updateUser
      tags:
        - Admin
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                role:
                  type: string
                  enum: [user, admin]
                password:
                  type: string
                username:
                  type: string
                avatar:
                  type: string
      responses:
        "200":
          description: User updated
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User not found

    delete:
      summary: Delete user (admin only)
      operationId: deleteUser
      tags:
        - Admin
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: User deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User not found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Use this for mobile apps or direct API access. For web browsers, prefer CookieAuth.
    CookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: httpOnly cookie containing the JWT access token

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - data
      properties:
        status:
          type: string
          enum: [success, error]
          description: Overall status of the API response envelope
          example: success
        data:
          type: object
          required:
            - status
            - timestamp
            - uptime
            - version
          properties:
            status:
              type: string
              enum: [healthy, unhealthy]
              description: Health state of the service
            timestamp:
              type: string
              format: date-time
              description: Current server time (ISO 8601)
            uptime:
              type: string
              description: Human‑readable service uptime (e.g., "1h2m3s")
            version:
              type: string
              description: API version (from build time)
            checks:
              type: object
              additionalProperties:
                type: string
              description: Detailed health checks for dependencies (database, cache, etc.)
              example:
                database: "ok"
                redis: "ok"

    LoginResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - expires_in
        - token_type
        - user
      properties:
        access_token:
          type: string
          description: JWT access token (for mobile apps)
        refresh_token:
          type: string
          description: Refresh token (for mobile apps)
        expires_in:
          type: integer
          description: Access token validity in seconds
          example: 3600
        token_type:
          type: string
          example: Bearer
        user:
          $ref: "#/components/schemas/UserProfile"

    RefreshResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - expires_in
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer

    UserProfile:
      type: object
      required:
        - id
        - username
        - email
        - role
      properties:
        id:
          type: string
        username:
          type: string
          description: Unique username
        email:
          type: string
        firstName:
          type: string
          description: User's first name (optional)
        lastName:
          type: string
          description: User's last name (optional)
        emailVerified:
          type: boolean
          description: Whether the email address has been verified
          default: false
        avatar:
          type: string
          description: URL to profile picture (optional)
        role:
          type: string
          enum: [user, admin]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserPreferences:
      type: object
      properties:
        notifications:
          type: boolean
        language:
          type: string
