<!DOCTYPE html>

<head><title>Validation Error</title></head>
<body>
<h1>422 Unprocessable Entity – Validation Error</h1>
<p>The request body failed validation. Check the <code>errors</code> field in the response.</p>
<h2>Common issues</h2>
<ul>
  <li>Missing required field</li>
  <li>Invalid email format</li>
  <li>Password too short (min 8 characters)</li>
  <li>Unsupported value for enum field</li>
</ul>
</body>
