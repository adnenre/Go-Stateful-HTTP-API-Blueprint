name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

      - name: Generate OpenAPI stubs
        run: make generate

      - name: Run tests
        run: make test
